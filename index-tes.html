<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AslanAsilon — Web Developer & Japanese Literature</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --purple-deep: #2d0060;
        --purple-mid: #5b00b5;
        --purple-bright: #8b5cf6;
        --purple-light: #c4b5fd;
        --purple-pale: #ede9fe;
        --glass-bg: rgba(255,255,255,0.12);
        --glass-border: rgba(255,255,255,0.25);
        --glass-strong: rgba(255,255,255,0.18);
        --text-white: #ffffff;
        --text-soft: rgba(255,255,255,0.75);
        --text-muted: rgba(255,255,255,0.5);
        --accent: #e879f9;
        --accent2: #818cf8;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Outfit', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a0038 0%, #2d0060 25%, #4a00a0 50%, #6b21a8 75%, #7c3aed 100%);
        background-attachment: fixed;
        color: var(--text-white);
        overflow-x: hidden;
      }

      /* Animated orbs */
      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
        animation: floatOrb 12s ease-in-out infinite;
      }
      .orb1 {
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(232,121,249,0.3) 0%, transparent 70%);
        top: -200px; left: -150px;
        animation-duration: 14s;
      }
      .orb2 {
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, transparent 70%);
        bottom: -100px; right: -100px;
        animation-duration: 10s;
        animation-direction: reverse;
      }
      .orb3 {
        width: 350px; height: 350px;
        background: radial-gradient(circle, rgba(129,140,248,0.25) 0%, transparent 70%);
        top: 40%; left: 50%;
        transform: translate(-50%, -50%);
        animation-duration: 16s;
      }
      @keyframes floatOrb {
        0%, 100% { transform: translateY(0) scale(1); }
        33% { transform: translateY(-40px) scale(1.05); }
        66% { transform: translateY(30px) scale(0.95); }
      }

      .content { position: relative; z-index: 1; }

      /* Glassmorphism */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
      }
      .glass-strong {
        background: var(--glass-strong);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255,255,255,0.3);
      }

      /* ── HEADER ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(45,0,96,0.7);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid var(--glass-border);
      }
      .header-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .logo {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 1.4rem;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #e879f9 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
      }

      .nav-links {
        display: flex;
        gap: 0.25rem;
        align-items: center;
      }
      .nav-link {
        padding: 0.4rem 0.85rem;
        border-radius: 100px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-soft);
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-link:hover {
        color: white;
        background: rgba(255,255,255,0.1);
      }

      /* Language Switcher */
      .lang-bar {
        display: flex;
        gap: 0.2rem;
        background: rgba(0,0,0,0.25);
        border: 1px solid var(--glass-border);
        border-radius: 100px;
        padding: 0.2rem;
      }
      .lang-btn {
        padding: 0.3rem 0.7rem;
        border-radius: 100px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: all 0.25s;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-family: 'Outfit', sans-serif;
      }
      .lang-btn.active {
        background: linear-gradient(135deg, #8b5cf6, #e879f9);
        color: #fff;
        box-shadow: 0 2px 12px rgba(232,121,249,0.4);
      }
      .lang-btn:hover:not(.active) { color: white; }

      /* ── HERO ── */
      .hero {
        max-width: 1200px;
        margin: 0 auto;
        padding: 5rem 2rem 4rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 3rem;
        align-items: center;
      }
      @media(max-width:768px){
        .hero { grid-template-columns: 1fr; padding: 3rem 1.25rem 2.5rem; }
        .hero-avatar-wrap { display: none; }
      }

      .hero-tag {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 0.4rem 1rem;
        border-radius: 100px;
        background: rgba(232,121,249,0.15);
        border: 1px solid rgba(232,121,249,0.35);
        color: #e879f9;
        margin-bottom: 1.75rem;
        width: fit-content;
      }
      .dot-blink {
        width: 7px; height: 7px;
        background: #e879f9;
        border-radius: 50%;
        animation: blink 2s infinite;
      }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

      .hero-name {
        font-size: clamp(2.8rem, 7vw, 5.5rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.04em;
        margin-bottom: 0.5rem;
      }
      .hero-name .grad {
        background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 40%, #e879f9 80%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero-name .white { color: white; }

      .hero-subtitle {
        font-size: 1.05rem;
        font-weight: 500;
        color: var(--text-soft);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .badge-edu {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.25rem 0.65rem;
        border-radius: 100px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: var(--purple-light);
        white-space: nowrap;
      }

      .hero-desc {
        max-width: 520px;
        color: var(--text-soft);
        line-height: 1.75;
        font-size: 1rem;
        margin-bottom: 2.5rem;
        font-weight: 400;
      }

      .hero-stats {
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
      }
      .stat-glass {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        backdrop-filter: blur(16px);
        border-radius: 16px;
        padding: 1rem 1.5rem;
        text-align: center;
        min-width: 90px;
        transition: transform 0.2s, background 0.2s;
      }
      .stat-glass:hover {
        background: rgba(255,255,255,0.16);
        transform: translateY(-3px);
      }
      .stat-num {
        display: block;
        font-size: 1.9rem;
        font-weight: 900;
        background: linear-gradient(135deg, #c4b5fd, #e879f9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        font-family: 'DM Mono', monospace;
      }
      .stat-lbl {
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.07em;
        margin-top: 0.3rem;
      }

      /* Avatar */
      .hero-avatar-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .avatar-ring {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8b5cf6, #e879f9, #818cf8);
        padding: 4px;
        animation: rotateBorder 6s linear infinite;
        box-shadow: 0 0 60px rgba(232,121,249,0.3);
      }
      @keyframes rotateBorder {
        0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)}
      }
      .avatar-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b0082, #6b21a8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 5rem;
        overflow: hidden;
      }
      .avatar-initials {
        font-weight: 900;
        font-size: 2.8rem;
        background: linear-gradient(135deg, #ffffff, #e879f9);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.05em;
      }

      /* ── SECTIONS ── */
      .section-wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem 5rem;
      }
      @media(max-width:640px){ .section-wrap { padding: 0 1.25rem 3rem; } }

      .section-heading {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid rgba(255,255,255,0.12);
      }
      .section-heading h2 {
        font-size: 1.65rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .section-heading h2 span { color: #e879f9; }
      .section-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(232,121,249,0.4), transparent);
      }

      /* ── FILTER BAR ── */
      .filter-bar {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      .search-wrap {
        flex: 1;
        min-width: 200px;
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: rgba(255,255,255,0.4);
        pointer-events: none;
      }
      .search-input {
        width: 100%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        border-radius: 12px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: all 0.2s;
        backdrop-filter: blur(8px);
      }
      .search-input::placeholder { color: rgba(255,255,255,0.35); }
      .search-input:focus {
        border-color: rgba(232,121,249,0.6);
        background: rgba(255,255,255,0.14);
        box-shadow: 0 0 0 3px rgba(232,121,249,0.15);
      }

      .cat-filters {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .cat-btn {
        padding: 0.55rem 1.05rem;
        border-radius: 10px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.6);
        font-family: 'Outfit', sans-serif;
        backdrop-filter: blur(8px);
      }
      .cat-btn:hover { color: white; border-color: rgba(255,255,255,0.4); }
      .cat-btn.active {
        background: linear-gradient(135deg, #8b5cf6, #e879f9);
        color: white;
        border-color: transparent;
        box-shadow: 0 4px 16px rgba(139,92,246,0.4);
      }

      .results-info {
        font-size: 0.78rem;
        color: rgba(255,255,255,0.45);
        margin-bottom: 1.5rem;
        font-family: 'DM Mono', monospace;
      }
      .results-info strong { color: #e879f9; }

      /* ── PORTFOLIO GRID ── */
      .portfolio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 1.25rem;
      }

      .port-card {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        overflow: hidden;
        transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        animation: cardIn 0.4s ease both;
      }
      @keyframes cardIn {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .port-card:hover {
        transform: translateY(-6px) scale(1.01);
        border-color: rgba(232,121,249,0.5);
        box-shadow: 0 24px 60px rgba(139,92,246,0.25), 0 0 0 1px rgba(232,121,249,0.2);
        background: rgba(255,255,255,0.15);
      }

      .card-thumb {
        height: 190px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3.5rem;
        position: relative;
        overflow: hidden;
      }
      .card-thumb::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.3) 100%);
      }

      .card-body { padding: 1.4rem; }

      .card-tags {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 0.85rem;
      }
      .tag {
        font-family: 'DM Mono', monospace;
        font-size: 0.62rem;
        font-weight: 500;
        padding: 0.2rem 0.55rem;
        border-radius: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .tag-php    { background: rgba(139,92,246,0.25); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.3); }
      .tag-python { background: rgba(250,204,21,0.15); color: #fde047; border: 1px solid rgba(250,204,21,0.25); }
      .tag-javascript { background: rgba(251,191,36,0.15); color: #fcd34d; border: 1px solid rgba(251,191,36,0.25); }
      .tag-laravel    { background: rgba(248,113,113,0.15); color: #fca5a5; border: 1px solid rgba(248,113,113,0.25); }
      .tag-react      { background: rgba(56,189,248,0.15); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.25); }
      .tag-nodejs     { background: rgba(74,222,128,0.15); color: #86efac; border: 1px solid rgba(74,222,128,0.25); }
      .tag-vuejs      { background: rgba(52,211,153,0.15); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.25); }
      .tag-mysql      { background: rgba(96,165,250,0.15); color: #93c5fd; border: 1px solid rgba(96,165,250,0.25); }
      .tag-flask      { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.15); }
      .tag-alpinejs   { background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }

      .card-name {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 0.45rem;
        line-height: 1.35;
        color: white;
      }
      .card-desc {
        font-size: 0.83rem;
        color: rgba(255,255,255,0.6);
        line-height: 1.65;
        margin-bottom: 1.1rem;
      }
      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 1rem;
        border-top: 1px solid rgba(255,255,255,0.1);
      }
      .card-year {
        font-family: 'DM Mono', monospace;
        font-size: 0.68rem;
        color: rgba(255,255,255,0.35);
      }
      .card-cta {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.78rem;
        font-weight: 700;
        color: #e879f9;
        cursor: pointer;
        transition: gap 0.2s, color 0.2s;
        text-decoration: none;
        letter-spacing: 0.02em;
      }
      .card-cta:hover { gap: 0.65rem; color: #f0abfc; }

      /* Empty state */
      .empty-state {
        grid-column: 1/-1;
        text-align: center;
        padding: 5rem 2rem;
        color: rgba(255,255,255,0.4);
      }
      .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
      .empty-state h3 { color: white; font-size: 1.1rem; margin-bottom: 0.5rem; }

      /* ── EDUCATION ── */
      .edu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.25rem;
      }
      .edu-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 18px;
        padding: 1.5rem;
        backdrop-filter: blur(16px);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .edu-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, #8b5cf6, #e879f9);
      }
      .edu-card:hover {
        background: rgba(255,255,255,0.13);
        transform: translateY(-3px);
        border-color: rgba(232,121,249,0.4);
      }
      .edu-icon { font-size: 2rem; margin-bottom: 0.75rem; }
      .edu-degree {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
        color: white;
      }
      .edu-major {
        font-size: 0.85rem;
        color: #c4b5fd;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      .edu-period {
        font-family: 'DM Mono', monospace;
        font-size: 0.7rem;
        color: rgba(255,255,255,0.4);
        margin-bottom: 0.75rem;
      }
      .edu-status {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.68rem;
        font-weight: 700;
        padding: 0.2rem 0.65rem;
        border-radius: 100px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .status-done {
        background: rgba(74,222,128,0.15);
        color: #86efac;
        border: 1px solid rgba(74,222,128,0.3);
      }
      .status-ongoing {
        background: rgba(232,121,249,0.15);
        color: #e879f9;
        border: 1px solid rgba(232,121,249,0.3);
      }

      /* ── SKILLS ── */
      .skills-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }
      .skill-pill {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        padding: 0.5rem 1rem;
        border-radius: 10px;
        font-size: 0.83rem;
        font-weight: 600;
        backdrop-filter: blur(8px);
        transition: all 0.2s;
        color: rgba(255,255,255,0.85);
      }
      .skill-pill:hover {
        background: rgba(139,92,246,0.2);
        border-color: rgba(139,92,246,0.4);
        color: white;
        transform: translateY(-2px);
      }

      /* ── CONTACT ── */
      .contact-card {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 24px;
        padding: 2.5rem;
        backdrop-filter: blur(20px);
        text-align: center;
        max-width: 600px;
        margin: 0 auto;
      }
      .contact-desc {
        color: rgba(255,255,255,0.6);
        line-height: 1.7;
        margin: 1rem 0 2rem;
      }
      .contact-links {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 1.75rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.25s;
        background: linear-gradient(135deg, #8b5cf6, #e879f9);
        color: white;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(139,92,246,0.4);
        font-family: 'Outfit', sans-serif;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(139,92,246,0.5);
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.8rem 1.5rem;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        text-decoration: none;
        transition: all 0.25s;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        font-family: 'Outfit', sans-serif;
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.16);
        transform: translateY(-2px);
      }

      /* Footer */
      footer {
