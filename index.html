<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AslanAsilon — Web Developer & Japanese Literature</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --purple-900: #0f0024;
        --purple-800: #1a0038;
        --purple-700: #2d0060;
        --purple-600: #4a00a0;
        --purple-500: #6b21a8;
        --purple-400: #8b5cf6;
        --purple-300: #c4b5fd;
        --purple-200: #ede9fe;
        --pink: #e879f9;
        --pink-light: #f0abfc;
        --indigo: #818cf8;
        --glass-xs: rgba(255, 255, 255, 0.06);
        --glass-sm: rgba(255, 255, 255, 0.1);
        --glass-md: rgba(255, 255, 255, 0.14);
        --glass-lg: rgba(255, 255, 255, 0.2);
        --border-sm: rgba(255, 255, 255, 0.12);
        --border-md: rgba(255, 255, 255, 0.2);
        --border-lg: rgba(255, 255, 255, 0.28);
        --text-1: #ffffff;
        --text-2: rgba(255, 255, 255, 0.78);
        --text-3: rgba(255, 255, 255, 0.52);
        --text-4: rgba(255, 255, 255, 0.32);
        --radius-sm: 10px;
        --radius-md: 16px;
        --radius-lg: 24px;
        --radius-xl: 32px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: "Outfit", sans-serif;
        min-height: 100vh;
        background:
          radial-gradient(
            ellipse 80% 60% at 20% 10%,
            rgba(139, 92, 246, 0.18) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 80% at 80% 90%,
            rgba(232, 121, 249, 0.12) 0%,
            transparent 60%
          ),
          linear-gradient(
            160deg,
            #0f0024 0%,
            #1a0038 20%,
            #2d0060 45%,
            #4a00a0 70%,
            #6b21a8 100%
          );
        background-attachment: fixed;
        color: var(--text-1);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      /* SAKURA CANVAS */
      #sakura-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        width: 100%;
        height: 100%;
      }

      /* ORBS */
      .orb-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(90px);
        animation: orbFloat ease-in-out infinite;
        will-change: transform;
      }
      .orb-a {
        width: min(700px, 100vw);
        height: min(700px, 100vw);
        background: radial-gradient(
          circle,
          rgba(232, 121, 249, 0.22) 0%,
          transparent 65%
        );
        top: -20%;
        left: -15%;
        animation-duration: 18s;
      }
      .orb-b {
        width: min(500px, 80vw);
        height: min(500px, 80vw);
        background: radial-gradient(
          circle,
          rgba(139, 92, 246, 0.28) 0%,
          transparent 65%
        );
        bottom: -15%;
        right: -10%;
        animation-duration: 13s;
        animation-direction: reverse;
      }
      .orb-c {
        width: min(380px, 70vw);
        height: min(380px, 70vw);
        background: radial-gradient(
          circle,
          rgba(129, 140, 248, 0.18) 0%,
          transparent 65%
        );
        top: 40%;
        left: 55%;
        animation-duration: 22s;
        animation-delay: -5s;
      }
      @keyframes orbFloat {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        25% {
          transform: translate(30px, -50px) scale(1.05);
        }
        50% {
          transform: translate(-20px, 30px) scale(0.95);
        }
        75% {
          transform: translate(40px, 20px) scale(1.03);
        }
      }

      .page {
        position: relative;
        z-index: 3;
      }

      /* HEADER */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 200;
        background: rgba(15, 0, 36, 0.75);
        backdrop-filter: blur(28px) saturate(1.4);
        -webkit-backdrop-filter: blur(28px) saturate(1.4);
        border-bottom: 1px solid var(--border-sm);
      }
      .header-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.85rem 1.25rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
      }
      .logo {
        font-weight: 900;
        font-size: clamp(1.05rem, 2.5vw, 1.35rem);
        letter-spacing: -0.04em;
        background: linear-gradient(
          135deg,
          #fff 0%,
          var(--purple-300) 45%,
          var(--pink) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .desktop-nav {
        display: flex;
        gap: 0.15rem;
        align-items: center;
      }
      .nav-a {
        padding: 0.4rem 0.9rem;
        border-radius: 100px;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-3);
        text-decoration: none;
        transition:
          color 0.2s,
          background 0.2s;
      }
      .nav-a:hover {
        color: var(--text-1);
        background: var(--glass-sm);
      }
      .lang-switcher {
        display: flex;
        gap: 0.15rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-md);
        border-radius: 100px;
        padding: 0.18rem;
        flex-shrink: 0;
      }
      .lang-btn {
        padding: 0.28rem 0.65rem;
        border-radius: 100px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: transparent;
        color: var(--text-3);
        font-family: "Outfit", sans-serif;
      }
      .lang-btn.active {
        background: linear-gradient(135deg, var(--purple-400), var(--pink));
        color: #fff;
        box-shadow: 0 2px 14px rgba(232, 121, 249, 0.45);
      }
      .lang-btn:hover:not(.active) {
        color: var(--text-1);
      }
      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        padding: 0.4rem;
        border: 1px solid var(--border-md);
        border-radius: 10px;
        background: var(--glass-sm);
        transition: background 0.2s;
      }
      .hamburger:hover {
        background: var(--glass-md);
      }
      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: var(--text-2);
        border-radius: 2px;
        transition: all 0.3s;
      }
      .hamburger.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }
      .hamburger.open span:nth-child(2) {
        opacity: 0;
      }
      .hamburger.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }
      .mobile-menu {
        display: none;
        flex-direction: column;
        gap: 0.25rem;
        padding: 1rem 1.25rem;
        border-top: 1px solid var(--border-sm);
        background: rgba(15, 0, 36, 0.9);
        backdrop-filter: blur(28px);
      }
      .mobile-menu.open {
        display: flex;
      }
      .mobile-nav-a {
        padding: 0.75rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-2);
        text-decoration: none;
        transition: all 0.2s;
        border: 1px solid transparent;
      }
      .mobile-nav-a:hover {
        color: var(--text-1);
        background: var(--glass-sm);
        border-color: var(--border-sm);
      }
      .mobile-lang-row {
        display: flex;
        gap: 0.5rem;
        padding: 0.5rem 0;
        margin-top: 0.25rem;
        border-top: 1px solid var(--border-sm);
      }
      .mobile-lang-btn {
        flex: 1;
        padding: 0.5rem;
        border-radius: var(--radius-sm);
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--border-md);
        background: var(--glass-sm);
        color: var(--text-3);
        font-family: "Outfit", sans-serif;
        transition: all 0.2s;
        text-align: center;
      }
      .mobile-lang-btn.active {
        background: linear-gradient(135deg, var(--purple-400), var(--pink));
        color: #fff;
        border-color: transparent;
      }

      /* HERO */
      .hero {
        max-width: 1280px;
        margin: 0 auto;
        padding: clamp(2.5rem, 8vw, 6rem) 1.25rem clamp(2rem, 5vw, 4rem);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: clamp(1.5rem, 4vw, 4rem);
        align-items: center;
      }
      .hero-available {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 0.38rem 1rem;
        border-radius: 100px;
        background: rgba(232, 121, 249, 0.12);
        border: 1px solid rgba(232, 121, 249, 0.3);
        color: var(--pink);
        margin-bottom: clamp(1rem, 3vw, 1.75rem);
        width: fit-content;
      }
      .blink-dot {
        width: 7px;
        height: 7px;
        background: var(--pink);
        border-radius: 50%;
        animation: blink 2.2s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.15;
          transform: scale(0.8);
        }
      }
      .hero-name {
        font-size: clamp(3rem, 10vw, 6.5rem);
        font-weight: 900;
        line-height: 0.92;
        letter-spacing: -0.04em;
        margin-bottom: clamp(0.75rem, 2vw, 1rem);
      }
      .hero-name .grad {
        display: block;
        background: linear-gradient(
          135deg,
          #fff 0%,
          var(--purple-300) 35%,
          var(--pink) 75%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero-roles {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: clamp(1rem, 3vw, 1.5rem);
      }
      .hero-role-text {
        font-size: clamp(0.85rem, 2vw, 1.05rem);
        font-weight: 500;
        color: var(--text-2);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 0.22rem 0.6rem;
        border-radius: 100px;
        background: var(--glass-sm);
        border: 1px solid var(--border-md);
        color: var(--purple-300);
        white-space: nowrap;
        line-height: 1.4;
      }
      .hero-desc {
        max-width: 520px;
        color: var(--text-2);
        line-height: 1.78;
        font-size: clamp(0.88rem, 1.8vw, 1rem);
        margin-bottom: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 400;
      }
      .stat-row {
        display: flex;
        flex-wrap: wrap;
        gap: clamp(0.65rem, 2vw, 1.25rem);
      }
      .stat-card {
        background: var(--glass-sm);
        border: 1px solid var(--border-md);
        backdrop-filter: blur(16px);
        border-radius: var(--radius-md);
        padding: clamp(0.75rem, 2vw, 1.1rem) clamp(1rem, 2.5vw, 1.5rem);
        text-align: center;
        transition:
          transform 0.2s,
          background 0.2s;
        cursor: default;
      }
      .stat-card:hover {
        background: var(--glass-md);
        transform: translateY(-3px);
      }
      .stat-n {
        display: block;
        font-family: "DM Mono", monospace;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 500;
        background: linear-gradient(135deg, var(--purple-300), var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
      }
      .stat-l {
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 0.3rem;
        display: block;
      }
      .hero-avatar-col {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .avatar-wrap {
        position: relative;
        width: clamp(150px, 20vw, 230px);
        height: clamp(150px, 20vw, 230px);
      }
      .avatar-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(
          var(--purple-400),
          var(--pink),
          var(--indigo),
          var(--purple-400)
        );
        padding: 3px;
        animation: spinRing 8s linear infinite;
      }
      @keyframes spinRing {
        to {
          transform: rotate(360deg);
        }
      }
      .avatar-ring-inner {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: var(--purple-700);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .avatar-ring-inner::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          var(--purple-700) 0%,
          var(--purple-500) 100%
        );
      }
      .avatar-initials {
        position: relative;
        z-index: 1;
        font-weight: 900;
        font-size: clamp(1.8rem, 5vw, 3rem);
        background: linear-gradient(135deg, #fff, var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.05em;
      }
      .avatar-glow {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(232, 121, 249, 0.2) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .avatar-badges {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      /* SECTIONS */
      .section {
        max-width: 1280px;
        margin: 0 auto;
        padding: 0 1.25rem clamp(3rem, 6vw, 5rem);
      }
      .sec-head {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: clamp(1.25rem, 3vw, 2rem);
        padding-bottom: 1.1rem;
        border-bottom: 1px solid var(--border-sm);
      }
      .sec-title {
        font-size: clamp(1.2rem, 3.5vw, 1.7rem);
        font-weight: 800;
        letter-spacing: -0.025em;
        white-space: nowrap;
      }
      .sec-title .ac {
        color: var(--pink);
      }
      .sec-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(232, 121, 249, 0.35),
          transparent
        );
        min-width: 0;
      }

      /* FILTER */
      .filter-bar {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .search-wrap {
        position: relative;
        width: 100%;
      }
      .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-3);
        pointer-events: none;
      }
      .search-input {
        width: 100%;
        background: var(--glass-sm);
        border: 1px solid var(--border-md);
        color: var(--text-1);
        padding: 0.78rem 1rem 0.78rem 2.75rem;
        border-radius: var(--radius-sm);
        font-family: "Outfit", sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: all 0.2s;
        backdrop-filter: blur(10px);
      }
      .search-input::placeholder {
        color: var(--text-4);
      }
      .search-input:focus {
        border-color: rgba(232, 121, 249, 0.55);
        background: var(--glass-md);
        box-shadow: 0 0 0 3px rgba(232, 121, 249, 0.12);
      }
      .cat-scroll {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .cat-btn {
        padding: 0.5rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.77rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid var(--border-md);
        background: var(--glass-xs);
        color: var(--text-3);
        font-family: "Outfit", sans-serif;
        backdrop-filter: blur(8px);
        white-space: nowrap;
        flex-shrink: 0;
      }
      .cat-btn:hover {
        color: var(--text-1);
        border-color: var(--border-lg);
        background: var(--glass-sm);
      }
      .cat-btn.active {
        background: linear-gradient(135deg, var(--purple-400), var(--pink));
        color: #fff;
        border-color: transparent;
        box-shadow: 0 4px 18px rgba(139, 92, 246, 0.4);
      }
      .results-count {
        font-family: "DM Mono", monospace;
        font-size: 0.73rem;
        color: var(--text-3);
        margin-bottom: 1.25rem;
      }
      .results-count strong {
        color: var(--pink);
      }

      /* PORTFOLIO GRID */
      .port-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
        gap: clamp(0.85rem, 2vw, 1.25rem);
      }
      .port-card {
        background: var(--glass-sm);
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
        border: 1px solid var(--border-md);
        border-radius: var(--radius-lg);
        overflow: hidden;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.3s,
          box-shadow 0.3s,
          background 0.3s;
        animation: cardIn 0.45s ease both;
        display: flex;
        flex-direction: column;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(22px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .port-card:hover {
        transform: translateY(-6px) scale(1.015);
        border-color: rgba(232, 121, 249, 0.45);
        box-shadow:
          0 20px 60px rgba(139, 92, 246, 0.22),
          0 0 0 1px rgba(232, 121, 249, 0.18);
        background: var(--glass-md);
      }
      .card-thumb {
        height: clamp(140px, 20vw, 195px);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(2.5rem, 6vw, 3.5rem);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .card-thumb-emoji {
        position: relative;
        z-index: 1;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
      }
      .card-thumb::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          transparent 40%,
          rgba(0, 0, 0, 0.28) 100%
        );
      }
      .card-body {
        padding: clamp(1rem, 2.5vw, 1.4rem);
        display: flex;
        flex-direction: column;
        flex: 1;
      }
      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-bottom: 0.8rem;
      }
      .tag {
        font-family: "DM Mono", monospace;
        font-size: 0.6rem;
        font-weight: 500;
        padding: 0.18rem 0.5rem;
        border-radius: 5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        line-height: 1.5;
      }
      .tag-php {
        background: rgba(139, 92, 246, 0.22);
        color: #c4b5fd;
        border: 1px solid rgba(139, 92, 246, 0.28);
      }
      .tag-python {
        background: rgba(250, 204, 21, 0.14);
        color: #fde047;
        border: 1px solid rgba(250, 204, 21, 0.22);
      }
      .tag-javascript {
        background: rgba(251, 191, 36, 0.14);
        color: #fcd34d;
        border: 1px solid rgba(251, 191, 36, 0.22);
      }
      .tag-laravel {
        background: rgba(248, 113, 113, 0.14);
        color: #fca5a5;
        border: 1px solid rgba(248, 113, 113, 0.22);
      }
      .tag-react {
        background: rgba(56, 189, 248, 0.14);
        color: #7dd3fc;
        border: 1px solid rgba(56, 189, 248, 0.22);
      }
      .tag-nodejs {
        background: rgba(74, 222, 128, 0.14);
        color: #86efac;
        border: 1px solid rgba(74, 222, 128, 0.22);
      }
      .tag-vuejs {
        background: rgba(52, 211, 153, 0.14);
        color: #6ee7b7;
        border: 1px solid rgba(52, 211, 153, 0.22);
      }
      .tag-mysql {
        background: rgba(96, 165, 250, 0.14);
        color: #93c5fd;
        border: 1px solid rgba(96, 165, 250, 0.22);
      }
      .tag-flask {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      .card-name {
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        font-weight: 700;
        margin-bottom: 0.4rem;
        line-height: 1.35;
        color: var(--text-1);
      }
      .card-desc {
        font-size: clamp(0.78rem, 1.6vw, 0.84rem);
        color: var(--text-2);
        line-height: 1.65;
        flex: 1;
        margin-bottom: 1rem;
      }
      .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 0.9rem;
        border-top: 1px solid var(--border-sm);
        margin-top: auto;
      }
      .card-year {
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        color: var(--text-4);
      }
      .card-cta {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--pink);
        text-decoration: none;
        letter-spacing: 0.02em;
        transition:
          gap 0.2s,
          color 0.2s;
      }
      .card-cta:hover {
        gap: 0.6rem;
        color: var(--pink-light);
      }
      .empty {
        grid-column: 1/-1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: clamp(3rem, 8vw, 5rem) 1rem;
        color: var(--text-3);
        gap: 0.75rem;
        text-align: center;
      }
      .empty-icon {
        font-size: 3rem;
      }
      .empty h3 {
        color: var(--text-1);
        font-size: 1.1rem;
      }

      /* EDUCATION */
      .edu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 250px), 1fr));
        gap: clamp(0.85rem, 2vw, 1.25rem);
      }
      .edu-card {
        background: var(--glass-xs);
        border: 1px solid var(--border-md);
        border-radius: var(--radius-md);
        padding: clamp(1.1rem, 2.5vw, 1.5rem);
        backdrop-filter: blur(18px);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
      }
      .edu-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--purple-400), var(--pink));
      }
      .edu-card:hover {
        background: var(--glass-sm);
        transform: translateY(-4px);
        border-color: rgba(232, 121, 249, 0.38);
        box-shadow: 0 16px 40px rgba(139, 92, 246, 0.18);
      }
      .edu-emoji {
        font-size: clamp(1.6rem, 4vw, 2.1rem);
        margin-bottom: 0.7rem;
        display: block;
      }
      .edu-degree {
        font-size: clamp(0.9rem, 2vw, 1rem);
        font-weight: 700;
        color: var(--text-1);
        margin-bottom: 0.25rem;
      }
      .edu-major {
        font-size: clamp(0.82rem, 1.8vw, 0.88rem);
        color: var(--purple-300);
        font-weight: 600;
        margin-bottom: 0.45rem;
      }
      .edu-period {
        font-family: "DM Mono", monospace;
        font-size: 0.68rem;
        color: var(--text-4);
        margin-bottom: 0.75rem;
      }
      .edu-status {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.2rem 0.6rem;
        border-radius: 100px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .s-done {
        background: rgba(74, 222, 128, 0.14);
        color: #86efac;
        border: 1px solid rgba(74, 222, 128, 0.28);
      }
      .s-ongoing {
        background: rgba(232, 121, 249, 0.14);
        color: var(--pink);
        border: 1px solid rgba(232, 121, 249, 0.28);
      }

      /* SKILLS */
      .skills-wrap {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }
      .skill-chip {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        background: var(--glass-xs);
        border: 1px solid var(--border-sm);
        padding: 0.45rem 0.9rem;
        border-radius: var(--radius-sm);
        font-size: clamp(0.76rem, 1.8vw, 0.83rem);
        font-weight: 600;
        color: var(--text-2);
        backdrop-filter: blur(8px);
        transition: all 0.2s;
        cursor: default;
      }
      .skill-chip:hover {
        background: rgba(139, 92, 246, 0.18);
        border-color: rgba(139, 92, 246, 0.38);
        color: var(--text-1);
        transform: translateY(-2px);
      }

      /* CONTACT */
      .contact-box {
        background: var(--glass-xs);
        border: 1px solid var(--border-md);
        border-radius: var(--radius-xl);
        padding: clamp(1.75rem, 5vw, 3rem);
        backdrop-filter: blur(22px);
        text-align: center;
        max-width: 640px;
        margin: 0 auto;
        position: relative;
        overflow: hidden;
      }
      .contact-box::before {
        content: "";
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 150px;
        background: radial-gradient(
          ellipse,
          rgba(232, 121, 249, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .contact-big-emoji {
        font-size: clamp(2rem, 5vw, 3rem);
        display: block;
        margin-bottom: 0.75rem;
        position: relative;
        z-index: 1;
      }
      .contact-heading {
        font-size: clamp(1.2rem, 3.5vw, 1.5rem);
        font-weight: 900;
        letter-spacing: -0.03em;
        position: relative;
        z-index: 1;
        margin-bottom: 0.75rem;
      }
      .contact-desc {
        color: var(--text-2);
        line-height: 1.72;
        font-size: clamp(0.85rem, 2vw, 0.95rem);
        margin-bottom: clamp(1.5rem, 3vw, 2rem);
        position: relative;
        z-index: 1;
        max-width: 440px;
        margin-left: auto;
        margin-right: auto;
      }
      .contact-btns {
        display: flex;
        gap: 0.65rem;
        justify-content: center;
        flex-wrap: wrap;
        position: relative;
        z-index: 1;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.78rem 1.6rem;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: clamp(0.82rem, 2vw, 0.9rem);
        text-decoration: none;
        background: linear-gradient(135deg, var(--purple-400), var(--pink));
        color: #fff;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 22px rgba(139, 92, 246, 0.42);
        font-family: "Outfit", sans-serif;
        transition: all 0.25s;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(139, 92, 246, 0.52);
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.78rem 1.4rem;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: clamp(0.82rem, 2vw, 0.9rem);
        text-decoration: none;
        background: var(--glass-sm);
        border: 1px solid var(--border-md);
        color: var(--text-1);
        font-family: "Outfit", sans-serif;
        transition: all 0.25s;
      }
      .btn-ghost:hover {
        background: var(--glass-md);
        transform: translateY(-2px);
        border-color: var(--border-lg);
      }

      /* FOOTER */
      footer {
        border-top: 1px solid var(--border-sm);
        padding: clamp(1.25rem, 3vw, 1.75rem) 1.25rem;
        text-align: center;
        color: var(--text-4);
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
      }
      footer strong {
        color: var(--text-3);
      }

      /* RESPONSIVE */
      @media (min-width: 640px) {
        .filter-bar {
          flex-direction: row;
          align-items: flex-start;
        }
        .search-wrap {
          flex: 1;
          min-width: 200px;
        }
      }
      @media (min-width: 768px) {
        .hamburger {
          display: none !important;
        }
        .desktop-nav {
          display: flex;
        }
        .mobile-menu {
          display: none !important;
        }
      }
      @media (max-width: 767px) {
        .desktop-nav {
          display: none;
        }
        .hamburger {
          display: flex;
        }
        .lang-switcher {
          display: none;
        }
        .hero {
          grid-template-columns: 1fr;
          text-align: center;
        }
        .hero-available {
          margin-left: auto;
          margin-right: auto;
        }
        .hero-roles {
          justify-content: center;
        }
        .hero-desc {
          margin-left: auto;
          margin-right: auto;
          max-width: 100%;
          text-align: left;
        }
        .stat-row {
          justify-content: center;
        }
        .hero-avatar-col {
          display: none;
        }
      }
      @media (max-width: 399px) {
        .header-inner {
          padding: 0.75rem 1rem;
        }
        .logo {
          font-size: 1rem;
        }
        .cat-scroll {
          gap: 0.3rem;
        }
        .cat-btn {
          padding: 0.4rem 0.75rem;
          font-size: 0.72rem;
        }
      }
      @media (min-width: 1024px) {
        .port-grid {
          grid-template-columns: repeat(3, 1fr);
        }
        .filter-bar {
          flex-direction: row;
        }
      }

      /* SCROLLBAR */
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(139, 92, 246, 0.45);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(232, 121, 249, 0.5);
      }
    </style>
  </head>

    <!-- 🌸 SAKURA ENGINE -->
    <script>
      (function () {
        const canvas = document.getElementById("sakura-canvas");
        const ctx = canvas.getContext("2d");

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        /* petal color palette: pink / lavender / white / rose */
        const COLORS = [
          [232, 121, 249], // vivid fuchsia
          [240, 171, 252], // soft pink
          [196, 181, 253], // lavender
          [255, 182, 220], // rose pink
          [255, 255, 255], // white
          [216, 150, 255], // purple-pink
          [255, 210, 235], // pale blush
        ];

        /* draw a 5-petal sakura flower */
        function drawPetal(x, y, r, rot, alpha, rgb) {
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);
          ctx.globalAlpha = alpha;

          const N = 5;
          ctx.beginPath();
          for (let i = 0; i < N; i++) {
            const base = (i / N) * Math.PI * 2;
            const tip = base + Math.PI / N;
            const next = base + (2 * Math.PI) / N;
            const inner = r * 0.38;

            const ix = Math.cos(next) * inner;
            const iy = Math.sin(next) * inner;
            const tx = Math.cos(tip) * r;
            const ty = Math.sin(tip) * r;
            const c1x = Math.cos(base) * r * 0.55;
            const c1y = Math.sin(base) * r * 0.55;
            const c2x = Math.cos(next) * r * 0.55;
            const c2y = Math.sin(next) * r * 0.55;

            if (i === 0) ctx.moveTo(ix, iy);
            ctx.bezierCurveTo(
              c1x,
              c1y,
              tx * 0.9 + c1x * 0.1,
              ty * 0.9 + c1y * 0.1,
              tx,
              ty,
            );
            ctx.bezierCurveTo(
              tx * 0.9 + c2x * 0.1,
              ty * 0.9 + c2y * 0.1,
              c2x,
              c2y,
              ix,
              iy,
            );
          }
          ctx.closePath();

          const g = ctx.createRadialGradient(0, -r * 0.1, r * 0.05, 0, 0, r);
          g.addColorStop(0, `rgba(255,240,255,0.92)`);
          g.addColorStop(0.4, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.82)`);
          g.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.22)`);
          ctx.fillStyle = g;
          ctx.fill();

          /* centre dot */
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.15, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,230,245,0.9)`;
          ctx.fill();

          ctx.restore();
        }

        class Petal {
          constructor(scatter) {
            this.init(scatter);
          }
          init(scatter) {
            const W = canvas.width,
              H = canvas.height;
            this.x = Math.random() * (W + 160) - 80;
            this.y = scatter
              ? Math.random() * H * 1.1
              : -(10 + Math.random() * 100);
            this.r = 6 + Math.random() * 11;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = 0.55 + Math.random() * 1.55;
            this.rot = Math.random() * Math.PI * 2;
            this.vrot = (Math.random() - 0.5) * 0.038;
            this.sway = Math.random() * Math.PI * 2;
            this.swayS = 0.01 + Math.random() * 0.018;
            this.swayA = 0.55 + Math.random() * 1.6;
            this.alpha = 0.5 + Math.random() * 0.5;
            this.fadeY =
              canvas.height * (0.75 + Math.random() * 0.2); /* fade start */
            this.rgb = COLORS[Math.floor(Math.random() * COLORS.length)];
          }
          update() {
            this.sway += this.swayS;
            this.x += Math.sin(this.sway) * this.swayA + this.vx;
            this.y += this.vy;
            this.rot += this.vrot;
            /* gentle fade at bottom */
            if (this.y > this.fadeY) {
              this.alpha -= 0.008;
            }
            if (this.y > canvas.height + 30 || this.alpha <= 0) {
              this.init(false);
            }
          }
          draw() {
            drawPetal(this.x, this.y, this.r, this.rot, this.alpha, this.rgb);
          }
        }

        /* count scales with viewport */
        function targetCount() {
          return Math.min(90, Math.max(30, Math.round(window.innerWidth / 13)));
        }
        let petals = Array.from(
          { length: targetCount() },
          () => new Petal(true),
        );

        window.addEventListener("resize", () => {
          const t = targetCount();
          while (petals.length < t) petals.push(new Petal(false));
          if (petals.length > t) petals.length = t;
        });

        let raf;
        function loop() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (const p of petals) {
            p.update();
            p.draw();
          }
          raf = requestAnimationFrame(loop);
        }
        loop();

        /* battery-friendly: pause when tab hidden */
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) cancelAnimationFrame(raf);
          else loop();
        });
      })();
    </script>
